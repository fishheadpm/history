<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歴史 一問一答</title>
  <link rel="stylesheet" href="style.css?v=1">
</head>
<body>
  <main class="container">
    <h1>歴史 一問一答</h1>

    <section id="seriesScreen" class="card">
      <h2>回を選択</h2>
      <div id="seriesButtons"></div>
    </section>

    <section id="menuScreen" class="card hidden">
      <h2 id="roundTitle"></h2>
      <button onclick="start()">最初から</button>
      <button onclick="continueGame()">続きから</button>
      <button onclick="showHistory()">間違えた履歴</button>
      <button onclick="resetHistory()">履歴リセット</button>
      <button class="secondary" onclick="backToSeries()">戻る</button>
    </section>

    <section id="quizScreen" class="card hidden">
      <p id="progress" class="progress"></p>
      <div class="questionBox">
        <p class="label">問題</p>
        <h2 id="question"></h2>
      </div>
      <button id="answerButton" onclick="showAnswer()">答え表示</button>
      <div id="answerArea" class="answerArea hidden">
        <p class="label">答え</p>
        <p id="answer" class="answer"></p>
        <button onclick="correct()">正解</button>
        <button onclick="wrong()">不正解</button>
      </div>
      <button class="secondary" onclick="backToMenu()">メニューに戻る</button>
    </section>
  </main>

  <script src="app.js?v=1"></script>
</body>
</html>
